name: Daily AI Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser requests
      - run: python scripts/fetch_rss.py
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_apis.py
      - run: python scripts/generate_digest.py
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Pulse Bot"
          git add data/
          git diff --staged --quiet || git commit -m "bot: daily update $(date '+%Y-%m-%d')"
          git push


